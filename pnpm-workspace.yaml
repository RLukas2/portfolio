packages:
  - apps/*
  - packages/*
  - tooling/*

allowBuilds:
  '@prisma/client': true
  '@sentry/cli': true
  better-sqlite3: true
  core-js: true
  es5-ext: true
  esbuild: true
  msw: true
  protobufjs: true

catalog:
  # React 19

  # Database (Drizzle + Neon)

  # Better Auth
  "@better-auth/cli": "1.4.21"

  # Testing (Vitest + Testing Library)
  "vitest": "^4.1.6"
  "@vitest/ui": "^4.1.6"
  "happy-dom": "^20.9.0"

  # Utilities (Zod, Prettier,...)
  "@sentry/node": "^10.53.1"
  "@t3-oss/env-core": "^0.13.11"
  "@tailwindcss/postcss": "^4.3.0"
  "@tailwindcss/vite": "^4.3.0"

  # Tanstack (latest)
  "@tanstack/devtools-a11y": latest
  "@tanstack/devtools-vite": ^0.7.0
  "@tanstack/react-devtools": ^0.10.5
  "@tanstack/react-form": "^1.32.0"
  "@tanstack/react-form-devtools": latest
  "@tanstack/react-form-start": latest
  "@tanstack/react-query": "^5.100.10"
  "@tanstack/react-query-devtools": ^5.100.10
  "@tanstack/react-router": "^1.170.4"
  "@tanstack/react-router-devtools": "^1.167.0"
  "@tanstack/react-router-ssr-query": ^1.167.0
  "@tanstack/react-start": "^1.168.6"

  # Types
  "@types/node": "^25.5.0"
  "@types/react": "^19.2.14"
  "@types/react-dom": "^19.2.3"
  "autoprefixer": "^10.5.0"
  "better-auth": "1.6.11"
  "lucide-react": "^1.16.0"
  "react": "^19.2.6"
  "react-dom": "^19.2.6"
  "simple-icons": "^16.20.0"

  # Tailwind CSS + UI
  "tailwindcss": "^4.3.0"
  "typescript": "^6.0.3"
  "vite": "^8.0.13"
  "zod": "^4.4.3"
